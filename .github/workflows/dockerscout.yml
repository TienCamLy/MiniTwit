name: Docker Scout Image Scan

on:
  push:
    branches:
      - implementing-Nginx
      - main
  pull_request:
    branches:
      - main

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f82d8f6b7f5c6a1d2e3f4a5b6c7d8e9f0a1b2c3d

      - name: Login to Docker Hub
        uses: docker/login-action@465a8783c5b2c7f4a9d1e2f3a4b5c6d7e8f9a0b1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t minitwit-app:latest -f razor-pages/Dockerfile .

      - name: Install Docker Scout CLI (secure, no shell execution)
        run: |
          mkdir -p $HOME/.docker/cli-plugins
          curl -sSL https://github.com/docker/scout-cli/releases/latest/download/docker-scout-linux-amd64 \
            -o $HOME/.docker/cli-plugins/docker-scout
          chmod +x $HOME/.docker/cli-plugins/docker-scout
          docker scout version

      - name: Run Docker Scout CVE scan (SHIFT-LEFT)
        run: docker scout cves minitwit-app:latest --only-severity critical,high --exit-code