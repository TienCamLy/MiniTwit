name: Docker Scout Image Scan

on:
  push:
    branches:
      - implementing-Nginx
      - main
  pull_request:
    branches:
      - main

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t minitwit-app:latest -f razor-pages/Dockerfile .

      - name: Install Docker Scout CLI
        run: |
          mkdir -p $HOME/.docker/cli-plugins
          curl -sSL https://github.com/docker/scout-cli/releases/latest/download/docker-scout-linux-amd64 \
            -o $HOME/.docker/cli-plugins/docker-scout
          chmod +x $HOME/.docker/cli-plugins/docker-scout
          docker scout version

      - name: Run Docker Scout CVE scan (SHIFT-LEFT)
        run: docker scout cves minitwit-app:latest --only-severity critical,high --exit-code