name: Docker Scout Image Scan

on:
  push:
    branches:
      - implementing-Nginx
      - main
  pull_request:
    branches:
      - main

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (required for Scout)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t minitwit-app:latest -f ./razor-pages/Dockerfile ./razor-pages

      - name: Enable Docker Scout
        run: docker scout version

      - name: Run Docker Scout CVE scan
        run: docker scout cves minitwit-app:latest --format table || true