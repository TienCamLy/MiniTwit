---
name: QA Report Word Counter

on:
  pull_request:
    branches:
      - main
    paths:
      - 'report/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare report word count comment
        run: |
          count=$(wc -w < report/MSc_group_f.md | awk '{print $1}')
          printf 'Report word count: **%s**\n' "$count" > report-word-count.md

      - name: Comment report word count on PR
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0
        with:
          message-path: report-word-count.md