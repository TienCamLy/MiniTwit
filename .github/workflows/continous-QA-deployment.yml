name: QA Deployment

on:
  pull_request:
    branches:
      - main
  # allow manual triggers too
  workflow_dispatch:

# Remember to set the following secrets in your repository's settings:
# https://github.com/your_username/itu-minitwit-ci/settings/secrets/actions
# DOCKER_USERNAME
# DOCKER_PASSWORD

# SSH_USER
# SSH_PRIVATE_KEY
# SSH_HOST
# SSH_HOST_TEST
# MONITOR_SSH_HOST

# TESTCONNECTIONSTRING
# API_TOKEN

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build & push testminitwit image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ secrets.DOCKER_USERNAME }}/testminitwit:${{ github.sha }} \
            -f razor-pages/Dockerfile . --push

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Copy config files to all nodes in Docker Swarm cluster
        run: |
          NODES="${{ secrets.SSH_HOST }} ${{ secrets.SSH_HOST_TEST }} ${{ secrets.MONITOR_SSH_HOST }}"     
          for IP in $NODES; do
            ssh -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no "${SSH_USER}@$IP" 'mkdir -p /vagrant/promtail'
            scp -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no ./promtail/promtail-config.yaml "${SSH_USER}@$IP:/vagrant/promtail/promtail-config.yaml"
          done     
          
          scp -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no ./compose.yaml "${SSH_USER}@${SSH_HOST}:/vagrant/compose.yaml"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_HOST_TEST: ${{ secrets.SSH_HOST_TEST }}
          MONITOR_SSH_HOST: ${{ secrets.MONITOR_SSH_HOST }}

      - name: Deploy to server (using compose)
        run: >
          ssh $SSH_USER@$SSH_HOST_TEST -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no
          "export DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}' && 
           export IMAGE_NAME='testminitwit' &&
           export IMAGE_TAG='${{ github.sha }}' && 
           export API_TOKEN='${{ secrets.API_TOKEN }}' &&
           export CONNECTIONSTRING='${{ secrets.TESTCONNECTIONSTRING }}' &&
           export LOKI_URL='http://${{ secrets.MONITOR_SSH_HOST }}:3101/loki/api/v1/push' &&
           cd /vagrant &&  
           docker stack deploy --with-registry-auth --resolve-image always -c compose.yaml minitwit"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST_TEST: ${{ secrets.SSH_HOST_TEST }}