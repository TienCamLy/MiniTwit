---
name: QA Deployment

on:
  pull_request:
    branches:
      - main
  # allow manual triggers too
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

# Remember to set the following secrets in your repository's settings:
# https://github.com/your_username/itu-minitwit-ci/settings/secrets/actions
# DOCKER_USERNAME
# DOCKER_PASSWORD

# SSH_USER
# SSH_PRIVATE_KEY
# SSH_HOST
# SSH_HOST_TEST
# MONITOR_SSH_HOST

# TESTCONNECTIONSTRING
# API_TOKEN
# AWS_ACCESS_KEY_ID
# AWS_SECRET_ACCESS_KEY

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx (for docker compose)
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      # promtail/.env must be copied to the QA droplet; Promtail only reads it on the server, not from CI.
      - name: Create .env file for compose
        run: |
          echo "API_TOKEN=$API_TOKEN" > razor-pages/Web/.env
          echo "CONNECTIONSTRINGS__DEFAULTCONNECTION=$CONNECTIONSTRING" >> razor-pages/Web/.env
          echo "LOKI_URL=$LOKI_URL" > promtail/.env
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          CONNECTIONSTRING: ${{ secrets.TESTCONNECTIONSTRING }}
          # loki-dev on the monitoring stack (host port 3101). Open TCP 3101 from this QA droplet on the monitor firewall.
          LOKI_URL: ${{ secrets.QA_LOKI_URL }}

      - name: Build & push minitwit image
        run: docker compose -f compose-test.yaml build && docker compose -f compose-test.yaml push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_NAME: testminitwit

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run Terraform plan
        run: |
          cd infrastructure/environments/prod && terraform init && terraform plan -var-file=prod.tfvars -out=plan.out
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_pub_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_pvt_key: ${{ secrets.SSH_PRIVATE_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Post Terraform Plan Comment in PR
        uses: towardsthecloud/terraform-plan-pr-commenter@v1
        with:
          planfile: plan.out
          working-directory: infrastructure/environments/prod
          
      - name: Copy .env files to server
        run: |
          ssh -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" 'mkdir -p /vagrant/promtail'
          scp -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no ./razor-pages/Web/.env "${SSH_USER}@${SSH_HOST}:/vagrant/razor-pages/Web/.env"
          scp -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no ./promtail/.env "${SSH_USER}@${SSH_HOST}:/vagrant/promtail/.env"
          scp -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no ./promtail/promtail-config.yaml "${SSH_USER}@${SSH_HOST}:/vagrant/promtail/promtail-config.yaml"
          scp -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no ./compose-test.yaml "${SSH_USER}@${SSH_HOST}:/vagrant/compose-test.yaml"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST_TEST }}

      - name: Deploy to server (using compose)
        run: >
          ssh $SSH_USER@$SSH_HOST
          -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no
          'export DOCKER_USERNAME='"$DOCKER_USERNAME"' 
          && docker image prune -a -f
          && cd /vagrant 
          && export IMAGE_NAME=testminitwit 
          && docker compose -f compose-test.yaml pull 
          && docker compose -f compose-test.yaml up -d --remove-orphans --force-recreate'
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST_TEST }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Reset test database state before running tests
        run: |
          psql "$TESTCONNECTIONSTRING" <<'SQL'
          BEGIN;
          TRUNCATE TABLE
          "Followers",
          "Messages",
          "AspNetUserTokens",
          "AspNetUserRoles",
          "AspNetUserLogins",
          "AspNetUserClaims",
          "AspNetUsers"
          RESTART IDENTITY CASCADE;
          DELETE FROM "SimulatorLatest";
          INSERT INTO "SimulatorLatest" ("Id", "latest_id") VALUES (1, 0);
          COMMIT;
          SQL

        env:
          TESTCONNECTIONSTRING: ${{ secrets.PSQL_TESTCONNECTIONSTRING }}

      - name: Run tests
        run: |
          export REGISTRATION_PAGE="http://${TEST_GUI_IP}:8081/register"
          make run-all-validations
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          TEST_GUI_IP: ${{ secrets.SSH_HOST_TEST }}