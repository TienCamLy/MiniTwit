---
name: Deploy Monitoring

on:
  pull_request:
  workflow_dispatch:

# Remember to set the following secrets in your repository's settings:
# https://github.com/your_username/itu-minitwit-ci/settings/secrets/actions
# DOCKER_USERNAME
# DOCKER_PASSWORD
# SSH_USER
# SSH_PRIVATE_KEY
# MONITOR_SSH_HOST

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key
          ssh-keyscan -H "$MONITOR_SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          MONITOR_SSH_HOST: ${{ secrets.MONITOR_SSH_HOST }}

      - name: Sync monitoring directory
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no" monitoring/ $SSH_USER@$MONITOR_SSH_HOST:/vagrant/monitoring
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          MONITOR_SSH_HOST: ${{ secrets.MONITOR_SSH_HOST }}

      - name: Deploy to server (using compose)
        run: >
          ssh $SSH_USER@$MONITOR_SSH_HOST
          -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no
          'cd /vagrant/monitoring && docker compose up -d'
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          MONITOR_SSH_HOST: ${{ secrets.MONITOR_SSH_HOST }}