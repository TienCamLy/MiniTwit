name: Test deployment

on:
  push:
    branches:
      - restructure/postgresql-merge
    workflow_dispatch:
      manual: true

# Remember to set the following secrets in your repository's settings:
# https://github.com/your_username/itu-minitwit-ci/settings/secrets/actions
# DOCKER_USERNAME
# DOCKER_PASSWORD
# SSH_USER
# SSH_KEY
# SSH_HOST

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx (for docker compose)
#        uses: docker/setup-buildx-action@v3
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Create .env file for compose
        run: |
          echo "API_TOKEN=${{ secrets.API_TOKEN }}" > razor-pages/Web/.env
          echo "CONNECTIONSTRINGS__DEFAULTCONNECTION=${{ secrets.CONNECTIONSTRING }}" >> razor-pages/Web/.env
      
      - name: Build & push minitwit image
        run: docker compose build && docker compose push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server (using compose)
        run: >
          ssh $SSH_USER@$TEMP_SSH_HOST
                    -i ~/.ssh/do_ssh_key 
                    -o StrictHostKeyChecking=no
                    -tt
                    'export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} && cd /MiniTwit && git checkout restructure/postgresql-merge && docker compose pull && docker compose up -d --remove-orphans'
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          TEMP_SSH_HOST: ${{ secrets.TEMP_SSH_HOST }}