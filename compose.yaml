services:
  razor-pages:
    image: ${DOCKER_USERNAME:-local}/${IMAGE_NAME:-minitwitimage}:latest
    build:
      context: .
      dockerfile: razor-pages/Dockerfile
    # Lets the container reach Postgres on the host (localhost in .env is wrong inside the container)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    env_file:
      - ./razor-pages/Web/.env
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    volumes:
      - keys-volume:/app/keys
  
volumes:
  keys-volume:
