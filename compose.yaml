services:
  razor-pages:
    image: ${DOCKER_USERNAME:-local}/minitwitimage:latest
    build:
      context: .
      dockerfile: razor-pages/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./razor-pages/Web/.env
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    volumes:
      - keys-volume:/app/keys
      - data-volume:/app/data
  
volumes:
  keys-volume:
  data-volume: