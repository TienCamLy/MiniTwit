services:
  razor-pages:
    image: ${DOCKER_USERNAME:-local}/${IMAGE_NAME:-testminitwit}:latest
    build:
      context: .
      dockerfile: razor-pages/Dockerfile
    # Lets the container reach Postgres on the host (localhost in .env is wrong inside the container)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8081"
    env_file:
      - ./razor-pages/Web/.env
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8081
      - ISLOCALDEVELOPMENT=${ISLOCALDEVELOPMENT:-false}
    volumes:
      - keys-volume:/app/keys

  promtail:
    image: grafana/promtail:3.6.7
    container_name: promtail
    restart: unless-stopped
    env_file:
      - ./promtail/.env
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - -config.file=/etc/promtail/config.yaml
      - -config.expand-env=true

volumes:
  keys-volume: